<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter | Jack Beecher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-bottom: 1.5rem;
      color: #8b949e;
      font-size: 0.82rem;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .back-link:hover { color: #3b82f6; }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    h1 span { color: #f59e0b; }

    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 0.88rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 0.5rem;
    }

    input[type="number"],
    select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    input[type="number"]:focus,
    select:focus { border-color: #3b82f6; }

    .row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .swap-btn {
      background: #1f2937;
      border: 1px solid #30363d;
      color: #8b949e;
      width: 38px;
      height: 42px;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .swap-btn:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    .convert-btn {
      width: 100%;
      padding: 0.85rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }

    .convert-btn:hover { background: #2563eb; }

    .result {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
      display: none;
    }

    .result .amount {
      font-size: 2rem;
      font-weight: 700;
      color: #10b981;
      margin-bottom: 0.25rem;
    }

    .result .rate {
      font-size: 0.8rem;
      color: #8b949e;
    }

    .result.show { display: block; }
  </style>
</head>
<body>

  <a class="back-link" href="ScratchPage.html">← Back to Travel Page</a>

  <div class="card">
    <h1>Currency <span>Converter</span></h1>
    <p class="subtitle">Quick conversions for your next trip</p>

    <label>Amount</label>
    <input type="number" id="amount" value="100" min="0" step="any"/>

    <div class="row">
      <div>
        <label>From</label>
        <select id="from"></select>
      </div>
      <button class="swap-btn" onclick="swap()" title="Swap currencies">⇄</button>
      <div>
        <label>To</label>
        <select id="to"></select>
      </div>
    </div>

    <button class="convert-btn" onclick="convert()">Convert</button>

    <div class="result" id="result">
      <div class="amount" id="resultAmount"></div>
      <div class="rate" id="resultRate"></div>
    </div>
  </div>

<script>
  const currencies = [
    ["USD","US Dollar"],["EUR","Euro"],["GBP","British Pound"],
    ["JPY","Japanese Yen"],["CAD","Canadian Dollar"],["AUD","Australian Dollar"],
    ["CHF","Swiss Franc"],["CNY","Chinese Yuan"],["MXN","Mexican Peso"],
    ["BRL","Brazilian Real"],["INR","Indian Rupee"],["KRW","South Korean Won"],
    ["SGD","Singapore Dollar"],["GTQ","Guatemalan Quetzal"],["IDR","Indonesian Rupiah"],
    ["THB","Thai Baht"],["AED","UAE Dirham"],["SEK","Swedish Krona"],
    ["NOK","Norwegian Krone"],["NZD","New Zealand Dollar"]
  ];

  const rates = {
    USD:1,EUR:0.92,GBP:0.79,JPY:149.5,CAD:1.36,AUD:1.53,
    CHF:0.90,CNY:7.24,MXN:17.1,BRL:4.97,INR:83.1,KRW:1325,
    SGD:1.34,GTQ:7.78,IDR:15600,THB:35.1,AED:3.67,
    SEK:10.4,NOK:10.6,NZD:1.63
  };

  const fromSel = document.getElementById('from');
  const toSel = document.getElementById('to');

  currencies.forEach(([code, name]) => {
    fromSel.add(new Option(`${code} — ${name}`, code));
    toSel.add(new Option(`${code} — ${name}`, code));
  });

  fromSel.value = "USD";
  toSel.value = "EUR";

  function convert() {
    const amount = parseFloat(document.getElementById('amount').value);
    const from = fromSel.value;
    const to = toSel.value;
    if (isNaN(amount) || amount < 0) return;
    const converted = (amount / rates[from]) * rates[to];
    const rate = rates[to] / rates[from];
    document.getElementById('resultAmount').textContent =
      converted.toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' ' + to;
    document.getElementById('resultRate').textContent =
      `1 ${from} = ${rate.toFixed(4)} ${to}`;
    document.getElementById('result').classList.add('show');
  }

  function swap() {
    const tmp = fromSel.value;
    fromSel.value = toSel.value;
    toSel.value = tmp;
    convert();
  }
</script>
</body>
</html>
